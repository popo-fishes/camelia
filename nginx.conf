# 设置 Nginx 的工作进程数，auto 表示根据 CPU 核心数自动设置
worker_processes auto;

# events 块用于配置 Nginx 处理连接的相关参数
events {
  # 每个 worker 进程可以同时处理的最大连接数
	worker_connections 768;
	# multi_accept on;  # 是否允许 worker 进程一次性接受多个新连接（当前已注释，未启用）
}

# http 块用于配置 HTTP 相关的全局设置和虚拟主机
http {
  # 启用 sendfile 优化文件传输性能
	sendfile on;
  # 启用 tcp_nopush，配合 sendfile 使用，减少网络包数量
	tcp_nopush on;
  # 设置 MIME 类型哈希表的最大大小
	types_hash_max_size 2048;

  # 定义一个虚拟主机（server 块）
  server {
    # 启用 gzip 压缩以减少传输数据量
    gzip on;
    # 只对大于等于 1024 字节的响应启用 gzip 压缩
    gzip_min_length 1024;
    # 指定需要压缩的 MIME 类型
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # 监听端口 80
    listen  80;

    # 定义根路径的处理逻辑
    location / {
      # 设置静态文件根目录
      root /app/docs-dist;
      # 尝试匹配文件或目录，若未找到则返回 index.html（适用于单页应用）
      try_files $uri $uri/   /index.html;
      # 添加响应头，禁止缓存
      add_header Cache-Control "no-cache, no-store";
      # 默认首页文件
      index  index.html index.htm;
    }
  }
}
